name: Build CyberFoil (master)

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HAUTH_SEED: ${{ secrets.HAUTH_SEED }}
      SHOP_ENC: ${{ secrets.SHOP_ENC }}

    container:
      image: devkitpro/devkita64:latest

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          start_ts=$(date +%s)
          dkp-pacman -S --noconfirm --needed switch-ntfs-3g switch-lwext4

          MAKE_ARGS=(-j"$(nproc)")
          if [ -n "${HAUTH_SEED:-}" ]; then
            HAUTH_SEED_OBF_HEX="$(python3 -c 'import os; s=os.environ.get("HAUTH_SEED", "").strip().encode("utf-8"); print("".join(f"{(b ^ ((0xA7 + ((i * 37) + 0x5C)) & 0xFF)):02x}" for i, b in enumerate(s)))')"
            MAKE_ARGS+=("HAUTH_SEED_OBF_HEX=$HAUTH_SEED_OBF_HEX")
          fi
          if [ -n "${SHOP_ENC:-}" ]; then
            EMBEDDED_SHOP_KEY_OBF_KEY_HEX="$(openssl rand -hex 16)"
            EMBEDDED_SHOP_KEY_OBF_HEX="$(printf '%s' "$SHOP_ENC" | openssl enc -aes-128-ecb -K "$EMBEDDED_SHOP_KEY_OBF_KEY_HEX" -nosalt | od -An -v -tx1 | tr -d ' \n')"
            MAKE_ARGS+=("EMBEDDED_SHOP_KEY_OBF_HEX=$EMBEDDED_SHOP_KEY_OBF_HEX")
            MAKE_ARGS+=("EMBEDDED_SHOP_KEY_OBF_KEY_HEX=$EMBEDDED_SHOP_KEY_OBF_KEY_HEX")
          fi
          make "${MAKE_ARGS[@]}"

          end_ts=$(date +%s)
          duration=$((end_ts - start_ts))

          if [ -f "./cyberfoil.nro" ]; then
            nro_status="present"
            nro_size=$(stat -c%s "./cyberfoil.nro" 2>/dev/null || stat -f%z "./cyberfoil.nro")
          else
            nro_status="missing"
            nro_size="0"
          fi

          {
            echo "## Build Summary"
            echo "- Commit: ${GITHUB_SHA}"
            echo "- Runner: $(uname -a)"
            echo "- Duration: ${duration}s"
            echo "- Output: cyberfoil.nro (${nro_status}, ${nro_size} bytes)"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload cyberfoil.nro artifact
        uses: actions/upload-artifact@v4
        with:
          name: cyberfoil-master-nro
          path: ./cyberfoil.nro
          if-no-files-found: error
