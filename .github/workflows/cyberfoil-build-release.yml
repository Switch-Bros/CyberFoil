name: Build CyberFoil (release)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HAUTH_SEED: ${{ secrets.HAUTH_SEED }}
      SHOP_ENC: ${{ secrets.SHOP_ENC }}

    container:
      image: devkitpro/devkita64:latest

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Build + verify expected NRO name/location
        shell: bash
        run: |
          set -euo pipefail

          dkp-pacman -S --noconfirm --needed switch-ntfs-3g switch-lwext4
          MAKE_ARGS=(-j"$(nproc)")
          if [ -n "${HAUTH_SEED:-}" ]; then
            HAUTH_SEED_OBF_HEX="$(python3 -c 'import os; s=os.environ.get("HAUTH_SEED", "").strip().encode("utf-8"); print("".join(f"{(b ^ ((0xA7 + ((i * 37) + 0x5C)) & 0xFF)):02x}" for i, b in enumerate(s)))')"
            MAKE_ARGS+=("HAUTH_SEED_OBF_HEX=$HAUTH_SEED_OBF_HEX")
          fi
          if [ -n "${SHOP_ENC:-}" ]; then
            EMBEDDED_SHOP_KEY_OBF_KEY_HEX="$(openssl rand -hex 16)"
            EMBEDDED_SHOP_KEY_OBF_HEX="$(printf '%s' "$SHOP_ENC" | openssl enc -aes-128-ecb -K "$EMBEDDED_SHOP_KEY_OBF_KEY_HEX" -nosalt | od -An -v -tx1 | tr -d ' \n')"
            MAKE_ARGS+=("EMBEDDED_SHOP_KEY_OBF_HEX=$EMBEDDED_SHOP_KEY_OBF_HEX")
            MAKE_ARGS+=("EMBEDDED_SHOP_KEY_OBF_KEY_HEX=$EMBEDDED_SHOP_KEY_OBF_KEY_HEX")
          fi
          make "${MAKE_ARGS[@]}"

          # Your Makefile outputs ./cyberfoil.nro (TARGET := cyberfoil)
          if [ ! -f "./cyberfoil.nro" ]; then
            echo "ERROR: Expected ./cyberfoil.nro not found"
            echo "Debug: any .nro files present?"
            find . -type f -name '*.nro' -print -exec ls -l {} \; || true
            exit 1
          fi

          # Ensure there aren't multiple .nro files
          COUNT="$(find . -type f -name '*.nro' | wc -l | tr -d ' ')"
          if [ "$COUNT" -ne 1 ]; then
            echo "ERROR: Expected exactly 1 .nro file, found $COUNT"
            find . -type f -name '*.nro' -print -exec ls -l {} \;
            exit 1
          fi

      - name: Package cyberfoil.zip (switch/cyberfoil/cyberfoil.nro)
        shell: bash
        run: |
          set -euo pipefail

          rm -rf dist cyberfoil.zip
          mkdir -p dist/switch/cyberfoil
          cp -v ./cyberfoil.nro dist/switch/cyberfoil/cyberfoil.nro

          # Create the zip using Python (no dependency on 'zip' being installed)
          python3 - <<'PY'
          import os, zipfile
          zip_name = "cyberfoil.zip"
          base_dir = "dist"
          with zipfile.ZipFile(zip_name, "w", compression=zipfile.ZIP_DEFLATED) as z:
              for root, _, files in os.walk(os.path.join(base_dir, "switch")):
                  for f in files:
                      full_path = os.path.join(root, f)
                      arcname = full_path[len(base_dir)+1:]  # strip "dist/"
                      z.write(full_path, arcname)
          print("Created", zip_name)
          PY

          echo "---- package ----"
          ls -lah cyberfoil.zip
          python3 - <<'PY'
          import zipfile
          with zipfile.ZipFile("cyberfoil.zip") as z:
              print("\n".join(z.namelist()))
          PY

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CyberFoil
          path: cyberfoil.zip
          if-no-files-found: error

      - name: Publish GitHub Release (auto notes)
        uses: softprops/action-gh-release@v2
        with:
          files: cyberfoil.zip
          generate_release_notes: true
